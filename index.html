<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indian State Capitals Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>State Wise Weather Dashboard</h1>

  <div class="controls">
    <input type="text" id="search" placeholder="Search capitals...">
    <button id="refresh">Refresh Data</button>
  </div>

  <div id="loading" style="display: none;">Loading weather data...</div>
  <div id="error" style="display: none; color: red;"></div>

  <div id="weather-container"></div>

  <!-- Empty state (WA-40) -->
  <div id="no-results" class="no-results hidden" aria-live="polite">
    <p><strong>No results found.</strong></p>
    <button id="clear-search" type="button">Clear search</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
